<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quên mật khẩu — SCI Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a3a5c 0%, #0d6efd 100%); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .card-wrap { border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.3); max-width:420px; width:100%; }
    .logo-area { background:#0d6efd; border-radius:16px 16px 0 0; padding:1.5rem 2rem; text-align:center; color:#fff; }
  </style>
</head>
<body>
<div class="card-wrap bg-white">
  <div class="logo-area">
    <i class="bi bi-key" style="font-size:2rem;"></i>
    <h5 class="mt-2 mb-0 fw-bold">Quên mật khẩu</h5>
    <p class="mb-0 opacity-75 small">SCI Portal</p>
  </div>
  <div class="p-4">

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="alert alert-info py-2 small mb-3">
      <i class="bi bi-info-circle me-1"></i>
      Hệ thống chưa gửi email tự động. Sau khi gửi yêu cầu, <strong>quản trị viên sẽ tạo mật khẩu tạm
      và báo cho bạn qua kênh khác</strong> (Zalo/gặp trực tiếp) — không phải qua email này.
    </div>

    <form method="post" action="/forgot-password">
      <label class="form-label fw-semibold">Email đăng nhập của bạn</label>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" name="email" class="form-control" placeholder="Email của bạn" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-send me-1"></i>Gửi yêu cầu đặt lại mật khẩu
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Về trang đăng nhập</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
